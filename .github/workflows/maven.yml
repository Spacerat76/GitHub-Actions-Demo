name: Maven CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

env:
  COVERAGE_LINE_MIN: '0.90'
  COVERAGE_BRANCH_MIN: '0.80'

jobs:
  build:
    name: build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
        java-version:
          - '21'

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ matrix.java-version }}
          cache: maven

      - name: Build and test with Maven Wrapper on Unix
        if: runner.os != 'Windows'
        run: |
          chmod +x mvnw
          ./mvnw --batch-mode verify

      - name: Build and test with Maven Wrapper on Windows
        if: runner.os == 'Windows'
        shell: cmd
        run: mvnw.cmd --batch-mode verify

  quality:
    name: quality
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Run static quality checks
        run: |
          chmod +x mvnw
          ./mvnw --batch-mode -DskipTests compile pmd:pmd spotbugs:spotbugs pmd:check spotbugs:check

      - name: Publish quality summary
        if: always()
        run: |
          python3 <<'PY'
          from pathlib import Path
          import xml.etree.ElementTree as ET

          def pmd_violations(path):
              if not path.exists():
                  return 'n/a'
              root = ET.parse(path).getroot()
              return str(len(root.findall('.//violation')))

          def spotbugs_violations(path):
              if not path.exists():
                  return 'n/a'
              root = ET.parse(path).getroot()
              return root.attrib.get('total_bugs', '0')

          summary = Path(__import__('os').environ['GITHUB_STEP_SUMMARY'])
          with summary.open('a', encoding='utf-8') as handle:
              handle.write('## Static Quality Checks\n\n')
              handle.write('| Tool | Findings |\n')
              handle.write('| --- | ---: |\n')
              handle.write(f'| PMD | {pmd_violations(Path("target/pmd.xml"))} |\n')
              handle.write(f'| SpotBugs | {spotbugs_violations(Path("target/spotbugsXml.xml"))} |\n')
          PY

  coverage:
    name: coverage
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Verify tests and generate coverage report
        run: |
          chmod +x mvnw
          ./mvnw --batch-mode verify

      - name: Check out base branch for coverage comparison
        if: github.event_name == 'pull_request'
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          path: base

      - name: Generate base branch coverage report
        if: github.event_name == 'pull_request'
        working-directory: base
        run: |
          chmod +x mvnw
          ./mvnw --batch-mode verify

      - name: Extract coverage metrics
        id: coverage_metrics
        run: |
          python3 <<'PY'
          import os
          import xml.etree.ElementTree as ET
          from pathlib import Path

          def read_ratios(report_path):
              report = ET.parse(report_path).getroot()
              counters = {
                  counter.attrib['type']: (int(counter.attrib['missed']), int(counter.attrib['covered']))
                  for counter in report.findall('counter')
              }

              def ratio(counter_name):
                  missed, covered = counters[counter_name]
                  total = missed + covered
                  return 0.0 if total == 0 else covered / total

              return ratio('LINE'), ratio('BRANCH')

          def format_pp(delta):
              return f'{delta * 100:+.2f} pp'

          line_ratio, branch_ratio = read_ratios('target/site/jacoco/jacoco.xml')
          line_min = float(os.environ['COVERAGE_LINE_MIN'])
          branch_min = float(os.environ['COVERAGE_BRANCH_MIN'])
          base_report_path = Path('base/target/site/jacoco/jacoco.xml')
          base_available = base_report_path.exists()

          base_line_ratio = None
          base_branch_ratio = None
          if base_available:
              base_line_ratio, base_branch_ratio = read_ratios(base_report_path)

          with open(os.environ['GITHUB_OUTPUT'], 'a', encoding='utf-8') as handle:
              handle.write(f'line_ratio={line_ratio:.4f}\n')
              handle.write(f'branch_ratio={branch_ratio:.4f}\n')
              handle.write(f'line_ratio_pct={line_ratio:.2%}\n')
              handle.write(f'branch_ratio_pct={branch_ratio:.2%}\n')
              handle.write(f'line_min_pct={line_min:.0%}\n')
              handle.write(f'branch_min_pct={branch_min:.0%}\n')
              handle.write(f'base_available={str(base_available).lower()}\n')

              if base_available:
                  handle.write(f'base_line_ratio_pct={base_line_ratio:.2%}\n')
                  handle.write(f'base_branch_ratio_pct={base_branch_ratio:.2%}\n')
                  handle.write(f'line_delta_pp={format_pp(line_ratio - base_line_ratio)}\n')
                  handle.write(f'branch_delta_pp={format_pp(branch_ratio - base_branch_ratio)}\n')

          summary = os.environ['GITHUB_STEP_SUMMARY']
          with open(summary, 'a', encoding='utf-8') as handle:
              handle.write('## Code Coverage\n\n')
              if base_available:
                  handle.write('| Metric | PR | Base | Delta | Minimum |\n')
                  handle.write('| --- | ---: | ---: | ---: | ---: |\n')
                  handle.write(
                      f'| Line | {line_ratio:.2%} | {base_line_ratio:.2%} | {format_pp(line_ratio - base_line_ratio)} | {line_min:.0%} |\n'
                  )
                  handle.write(
                      f'| Branch | {branch_ratio:.2%} | {base_branch_ratio:.2%} | {format_pp(branch_ratio - base_branch_ratio)} | {branch_min:.0%} |\n'
                  )
              else:
                  handle.write('| Metric | Coverage | Minimum |\n')
                  handle.write('| --- | ---: | ---: |\n')
                  handle.write(f'| Line | {line_ratio:.2%} | {line_min:.0%} |\n')
                  handle.write(f'| Branch | {branch_ratio:.2%} | {branch_min:.0%} |\n')
          PY

      - name: Comment coverage on pull request
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/github-script@v9
        env:
          BASE_AVAILABLE: ${{ steps.coverage_metrics.outputs.base_available }}
          LINE_RATIO_PCT: ${{ steps.coverage_metrics.outputs.line_ratio_pct }}
          BRANCH_RATIO_PCT: ${{ steps.coverage_metrics.outputs.branch_ratio_pct }}
          BASE_LINE_RATIO_PCT: ${{ steps.coverage_metrics.outputs.base_line_ratio_pct }}
          BASE_BRANCH_RATIO_PCT: ${{ steps.coverage_metrics.outputs.base_branch_ratio_pct }}
          LINE_DELTA_PP: ${{ steps.coverage_metrics.outputs.line_delta_pp }}
          BRANCH_DELTA_PP: ${{ steps.coverage_metrics.outputs.branch_delta_pp }}
          LINE_MIN_PCT: ${{ steps.coverage_metrics.outputs.line_min_pct }}
          BRANCH_MIN_PCT: ${{ steps.coverage_metrics.outputs.branch_min_pct }}
        with:
          script: |
            const marker = '<!-- coverage-report -->';
            const baseRef = context.payload.pull_request.base.ref;
            const bodyLines = [marker, '## Code Coverage', ''];

            if (process.env.BASE_AVAILABLE === 'true') {
              bodyLines.push(`Compared with base branch \`${baseRef}\`.`);
              bodyLines.push('');
              bodyLines.push('| Metric | PR | Base | Delta | Minimum |');
              bodyLines.push('| --- | ---: | ---: | ---: | ---: |');
              bodyLines.push(
                `| Line | ${process.env.LINE_RATIO_PCT} | ${process.env.BASE_LINE_RATIO_PCT} | ${process.env.LINE_DELTA_PP} | ${process.env.LINE_MIN_PCT} |`
              );
              bodyLines.push(
                `| Branch | ${process.env.BRANCH_RATIO_PCT} | ${process.env.BASE_BRANCH_RATIO_PCT} | ${process.env.BRANCH_DELTA_PP} | ${process.env.BRANCH_MIN_PCT} |`
              );
            } else {
              bodyLines.push('| Metric | Coverage | Minimum |');
              bodyLines.push('| --- | ---: | ---: |');
              bodyLines.push(`| Line | ${process.env.LINE_RATIO_PCT} | ${process.env.LINE_MIN_PCT} |`);
              bodyLines.push(`| Branch | ${process.env.BRANCH_RATIO_PCT} | ${process.env.BRANCH_MIN_PCT} |`);
            }

            const body = bodyLines.join('\n');

            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });

            const existing = comments.find((comment) =>
              comment.user?.type === 'Bot' && comment.body?.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }

      - name: Enforce coverage thresholds
        env:
          LINE_RATIO: ${{ steps.coverage_metrics.outputs.line_ratio }}
          BRANCH_RATIO: ${{ steps.coverage_metrics.outputs.branch_ratio }}
        run: |
          python3 <<'PY'
          import os

          line_ratio = float(os.environ['LINE_RATIO'])
          branch_ratio = float(os.environ['BRANCH_RATIO'])
          line_min = float(os.environ['COVERAGE_LINE_MIN'])
          branch_min = float(os.environ['COVERAGE_BRANCH_MIN'])

          if line_ratio < line_min or branch_ratio < branch_min:
              raise SystemExit(
                  f'Coverage threshold not met: line={line_ratio:.2%}, branch={branch_ratio:.2%}'
              )
          PY