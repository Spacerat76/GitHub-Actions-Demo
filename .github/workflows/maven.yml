name: Maven CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

env:
  COVERAGE_LINE_MIN: '0.90'
  COVERAGE_BRANCH_MIN: '0.80'

jobs:
  build:
    name: build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
        java-version:
          - '21'

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ matrix.java-version }}
          cache: maven

      - name: Build and test with Maven Wrapper on Unix
        if: runner.os != 'Windows'
        run: |
          chmod +x mvnw
          ./mvnw --batch-mode verify

      - name: Build and test with Maven Wrapper on Windows
        if: runner.os == 'Windows'
        shell: cmd
        run: mvnw.cmd --batch-mode verify

  coverage:
    name: coverage
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Verify tests and generate coverage report
        run: |
          chmod +x mvnw
          ./mvnw --batch-mode verify

      - name: Extract coverage metrics
        id: coverage_metrics
        run: |
          python3 <<'PY'
          import os
          import xml.etree.ElementTree as ET

          report = ET.parse('target/site/jacoco/jacoco.xml').getroot()
          counters = {
              counter.attrib['type']: (int(counter.attrib['missed']), int(counter.attrib['covered']))
              for counter in report.findall('counter')
          }

          def ratio(counter_name):
              missed, covered = counters[counter_name]
              total = missed + covered
              return 0.0 if total == 0 else covered / total

          line_ratio = ratio('LINE')
          branch_ratio = ratio('BRANCH')
          line_min = float(os.environ['COVERAGE_LINE_MIN'])
          branch_min = float(os.environ['COVERAGE_BRANCH_MIN'])

          with open(os.environ['GITHUB_OUTPUT'], 'a', encoding='utf-8') as handle:
              handle.write(f'line_ratio={line_ratio:.4f}\n')
              handle.write(f'branch_ratio={branch_ratio:.4f}\n')
              handle.write(f'line_ratio_pct={line_ratio:.2%}\n')
              handle.write(f'branch_ratio_pct={branch_ratio:.2%}\n')
              handle.write(f'line_min_pct={line_min:.0%}\n')
              handle.write(f'branch_min_pct={branch_min:.0%}\n')

          summary = os.environ['GITHUB_STEP_SUMMARY']
          with open(summary, 'a', encoding='utf-8') as handle:
              handle.write('## Code Coverage\n\n')
              handle.write('| Metric | Coverage | Minimum |\n')
              handle.write('| --- | ---: | ---: |\n')
              handle.write(f'| Line | {line_ratio:.2%} | {line_min:.0%} |\n')
              handle.write(f'| Branch | {branch_ratio:.2%} | {branch_min:.0%} |\n')
          PY

      - name: Comment coverage on pull request
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/github-script@v9
        env:
          LINE_RATIO_PCT: ${{ steps.coverage_metrics.outputs.line_ratio_pct }}
          BRANCH_RATIO_PCT: ${{ steps.coverage_metrics.outputs.branch_ratio_pct }}
          LINE_MIN_PCT: ${{ steps.coverage_metrics.outputs.line_min_pct }}
          BRANCH_MIN_PCT: ${{ steps.coverage_metrics.outputs.branch_min_pct }}
        with:
          script: |
            const marker = '<!-- coverage-report -->';
            const body = [
              marker,
              '## Code Coverage',
              '',
              '| Metric | Coverage | Minimum |',
              '| --- | ---: | ---: |',
              `| Line | ${process.env.LINE_RATIO_PCT} | ${process.env.LINE_MIN_PCT} |`,
              `| Branch | ${process.env.BRANCH_RATIO_PCT} | ${process.env.BRANCH_MIN_PCT} |`
            ].join('\n');

            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });

            const existing = comments.find((comment) =>
              comment.user?.type === 'Bot' && comment.body?.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }

      - name: Enforce coverage thresholds
        env:
          LINE_RATIO: ${{ steps.coverage_metrics.outputs.line_ratio }}
          BRANCH_RATIO: ${{ steps.coverage_metrics.outputs.branch_ratio }}
        run: |
          python3 <<'PY'
          import os

          line_ratio = float(os.environ['LINE_RATIO'])
          branch_ratio = float(os.environ['BRANCH_RATIO'])
          line_min = float(os.environ['COVERAGE_LINE_MIN'])
          branch_min = float(os.environ['COVERAGE_BRANCH_MIN'])

          if line_ratio < line_min or branch_ratio < branch_min:
              raise SystemExit(
                  f'Coverage threshold not met: line={line_ratio:.2%}, branch={branch_ratio:.2%}'
              )
          PY