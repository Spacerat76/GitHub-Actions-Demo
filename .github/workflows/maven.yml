name: Maven CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    name: build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
        java-version:
          - '21'

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ matrix.java-version }}
          cache: maven

      - name: Build and test with Maven Wrapper on Unix
        if: runner.os != 'Windows'
        run: |
          chmod +x mvnw
          ./mvnw --batch-mode verify

      - name: Build and test with Maven Wrapper on Windows
        if: runner.os == 'Windows'
        shell: cmd
        run: mvnw.cmd --batch-mode verify