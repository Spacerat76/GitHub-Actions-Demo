name: Maven CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

env:
  COVERAGE_LINE_MIN: '0.90'
  COVERAGE_BRANCH_MIN: '0.80'
  COVERAGE_DIFF_LINE_MIN: '0.90'

jobs:
  build:
    name: build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
        java-version:
          - '21'

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ matrix.java-version }}
          cache: maven

      - name: Build and test with Maven Wrapper on Unix
        if: runner.os != 'Windows'
        run: |
          chmod +x mvnw
          ./mvnw --batch-mode verify

      - name: Build and test with Maven Wrapper on Windows
        if: runner.os == 'Windows'
        shell: cmd
        run: mvnw.cmd --batch-mode verify

  quality:
    name: quality
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Run static quality reports
        run: |
          chmod +x mvnw
          ./mvnw --batch-mode -DskipTests compile checkstyle:checkstyle pmd:pmd spotbugs:spotbugs

      - name: Check out base branch for quality comparison
        if: github.event_name == 'pull_request'
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          path: quality-base

      - name: Run base branch quality reports
        if: github.event_name == 'pull_request'
        working-directory: quality-base
        run: |
          chmod +x mvnw
          ./mvnw --batch-mode -DskipTests compile checkstyle:checkstyle pmd:pmd spotbugs:spotbugs

      - name: Extract quality metrics
        id: quality_metrics
        run: |
          python3 <<'PY'
          import os
          import xml.etree.ElementTree as ET
          from pathlib import Path

          PMD_NS = {'p': 'http://pmd.sourceforge.net/report/2.0.0'}

          def normalize_path(path_value):
              normalized = (path_value or 'unknown').replace('\\', '/')
              markers = ['/src/main/java/', '/src/test/java/', '/target/generated-sources/annotations/']
              for marker in markers:
                  if marker in normalized:
                      return normalized.split(marker, 1)[1]
              return normalized

          def parse_checkstyle(report_path):
              if not report_path.exists():
                  return set()
              root = ET.parse(report_path).getroot()
              findings = set()
              for file_node in root.findall('file'):
                  relative_path = normalize_path(file_node.attrib.get('name'))
                  for error in file_node.findall('error'):
                      findings.add((
                          relative_path,
                          error.attrib.get('source', ''),
                          error.attrib.get('line', '0'),
                          error.attrib.get('message', ''),
                      ))
              return findings

          def parse_pmd(report_path):
              if not report_path.exists():
                  return set()
              root = ET.parse(report_path).getroot()
              findings = set()
              for file_node in root.findall('p:file', PMD_NS):
                  relative_path = normalize_path(file_node.attrib.get('name'))
                  for violation in file_node.findall('p:violation', PMD_NS):
                      findings.add((
                          relative_path,
                          violation.attrib.get('rule', ''),
                          violation.attrib.get('beginline', '0'),
                          ' '.join((violation.text or '').split()),
                      ))
              return findings

          def parse_spotbugs(report_path):
              if not report_path.exists():
                  return set()
              root = ET.parse(report_path).getroot()
              findings = set()
              for bug in root.findall('BugInstance'):
                  class_node = bug.find('Class')
                  source_line = bug.find('SourceLine')
                  if source_line is None and class_node is not None:
                      source_line = class_node.find('SourceLine')

                  relative_path = normalize_path(
                      source_line.attrib.get('sourcepath') if source_line is not None else class_node.attrib.get('classname', '')
                  )
                  findings.add((
                      relative_path,
                      bug.attrib.get('type', ''),
                      source_line.attrib.get('start', '0') if source_line is not None else '0',
                      bug.attrib.get('category', ''),
                  ))
              return findings

          def collect_reports(base_dir):
              base = Path(base_dir)
              return {
                  'checkstyle': parse_checkstyle(base / 'target/checkstyle-result.xml'),
                  'pmd': parse_pmd(base / 'target/pmd.xml'),
                  'spotbugs': parse_spotbugs(base / 'target/spotbugsXml.xml'),
              }

          current = collect_reports('.')
          base_reports = collect_reports('quality-base')
          base_available = Path('quality-base/target').exists()

          with open(os.environ['GITHUB_OUTPUT'], 'a', encoding='utf-8') as handle:
              handle.write(f'base_available={str(base_available).lower()}\n')
              total_new = 0
              total_current = 0
              total_base = 0

              for tool in ('checkstyle', 'pmd', 'spotbugs'):
                  current_count = len(current[tool])
                  base_count = len(base_reports[tool]) if base_available else 0
                  new_count = len(current[tool] - base_reports[tool]) if base_available else current_count
                  total_current += current_count
                  total_base += base_count
                  total_new += new_count
                  handle.write(f'{tool}_count={current_count}\n')
                  handle.write(f'{tool}_base_count={base_count}\n')
                  handle.write(f'{tool}_new_count={new_count}\n')

              handle.write(f'total_count={total_current}\n')
              handle.write(f'total_base_count={total_base}\n')
              handle.write(f'total_new_count={total_new}\n')
          PY

      - name: Publish quality summary
        if: always()
        env:
          BASE_AVAILABLE: ${{ steps.quality_metrics.outputs.base_available }}
          CHECKSTYLE_COUNT: ${{ steps.quality_metrics.outputs.checkstyle_count }}
          CHECKSTYLE_BASE_COUNT: ${{ steps.quality_metrics.outputs.checkstyle_base_count }}
          CHECKSTYLE_NEW_COUNT: ${{ steps.quality_metrics.outputs.checkstyle_new_count }}
          PMD_COUNT: ${{ steps.quality_metrics.outputs.pmd_count }}
          PMD_BASE_COUNT: ${{ steps.quality_metrics.outputs.pmd_base_count }}
          PMD_NEW_COUNT: ${{ steps.quality_metrics.outputs.pmd_new_count }}
          SPOTBUGS_COUNT: ${{ steps.quality_metrics.outputs.spotbugs_count }}
          SPOTBUGS_BASE_COUNT: ${{ steps.quality_metrics.outputs.spotbugs_base_count }}
          SPOTBUGS_NEW_COUNT: ${{ steps.quality_metrics.outputs.spotbugs_new_count }}
        run: |
          python3 <<'PY'
          import os
          from pathlib import Path

          summary = Path(os.environ['GITHUB_STEP_SUMMARY'])
          base_available = os.environ['BASE_AVAILABLE'] == 'true'
          tools = ('checkstyle', 'pmd', 'spotbugs')

          with summary.open('a', encoding='utf-8') as handle:
              handle.write('## Static Quality Checks\n\n')
              if base_available:
                  handle.write('Only new findings compared with the base branch fail this check on pull requests.\n\n')
                  handle.write('| Tool | PR Findings | Base Findings | New Findings |\n')
                  handle.write('| --- | ---: | ---: | ---: |\n')
                  for tool in tools:
                      name = 'Checkstyle' if tool == 'checkstyle' else ('PMD' if tool == 'pmd' else 'SpotBugs')
                      handle.write(
                          f'| {name} | {os.environ[tool.upper() + "_COUNT"]} | {os.environ[tool.upper() + "_BASE_COUNT"]} | {os.environ[tool.upper() + "_NEW_COUNT"]} |\n'
                      )
              else:
                  handle.write('| Tool | Findings |\n')
                  handle.write('| --- | ---: |\n')
                  for tool in tools:
                      name = 'Checkstyle' if tool == 'checkstyle' else ('PMD' if tool == 'pmd' else 'SpotBugs')
                      handle.write(f'| {name} | {os.environ[tool.upper() + "_COUNT"]} |\n')
          PY

      - name: Comment quality results on pull request
        if: always() && github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/github-script@v9
        env:
          BASE_AVAILABLE: ${{ steps.quality_metrics.outputs.base_available }}
          CHECKSTYLE_COUNT: ${{ steps.quality_metrics.outputs.checkstyle_count }}
          CHECKSTYLE_BASE_COUNT: ${{ steps.quality_metrics.outputs.checkstyle_base_count }}
          CHECKSTYLE_NEW_COUNT: ${{ steps.quality_metrics.outputs.checkstyle_new_count }}
          PMD_COUNT: ${{ steps.quality_metrics.outputs.pmd_count }}
          PMD_BASE_COUNT: ${{ steps.quality_metrics.outputs.pmd_base_count }}
          PMD_NEW_COUNT: ${{ steps.quality_metrics.outputs.pmd_new_count }}
          SPOTBUGS_COUNT: ${{ steps.quality_metrics.outputs.spotbugs_count }}
          SPOTBUGS_BASE_COUNT: ${{ steps.quality_metrics.outputs.spotbugs_base_count }}
          SPOTBUGS_NEW_COUNT: ${{ steps.quality_metrics.outputs.spotbugs_new_count }}
          TOTAL_COUNT: ${{ steps.quality_metrics.outputs.total_count }}
          TOTAL_NEW_COUNT: ${{ steps.quality_metrics.outputs.total_new_count }}
        with:
          script: |
            const marker = '<!-- quality-report -->';
            const baseRef = context.payload.pull_request.base.ref;
            const baseAvailable = process.env.BASE_AVAILABLE === 'true';
            const totalNew = Number(process.env.TOTAL_NEW_COUNT || '0');
            const totalCount = Number(process.env.TOTAL_COUNT || '0');
            const status = baseAvailable
              ? (totalNew === 0 ? 'Passed' : 'Failed')
              : (totalCount === 0 ? 'Passed' : 'Failed');
            const bodyLines = [marker, '## Static Quality Checks', '', `Status: ${status}`];

            if (baseAvailable) {
              bodyLines.push(`Compared with base branch \`${baseRef}\`.`);
              bodyLines.push('');
              bodyLines.push('| Tool | PR Findings | Base Findings | New Findings |');
              bodyLines.push('| --- | ---: | ---: | ---: |');
              bodyLines.push(`| Checkstyle | ${process.env.CHECKSTYLE_COUNT} | ${process.env.CHECKSTYLE_BASE_COUNT} | ${process.env.CHECKSTYLE_NEW_COUNT} |`);
              bodyLines.push(`| PMD | ${process.env.PMD_COUNT} | ${process.env.PMD_BASE_COUNT} | ${process.env.PMD_NEW_COUNT} |`);
              bodyLines.push(`| SpotBugs | ${process.env.SPOTBUGS_COUNT} | ${process.env.SPOTBUGS_BASE_COUNT} | ${process.env.SPOTBUGS_NEW_COUNT} |`);
              bodyLines.push(`| Total | ${process.env.TOTAL_COUNT} | - | ${process.env.TOTAL_NEW_COUNT} |`);
            } else {
              bodyLines.push('');
              bodyLines.push('| Tool | Findings |');
              bodyLines.push('| --- | ---: |');
              bodyLines.push(`| Checkstyle | ${process.env.CHECKSTYLE_COUNT} |`);
              bodyLines.push(`| PMD | ${process.env.PMD_COUNT} |`);
              bodyLines.push(`| SpotBugs | ${process.env.SPOTBUGS_COUNT} |`);
              bodyLines.push(`| Total | ${process.env.TOTAL_COUNT} |`);
            }

            const body = bodyLines.join('\n');

            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });

            const existing = comments.find((comment) =>
              comment.user?.type === 'Bot' && comment.body?.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }

      - name: Enforce quality thresholds
        env:
          BASE_AVAILABLE: ${{ steps.quality_metrics.outputs.base_available }}
          TOTAL_COUNT: ${{ steps.quality_metrics.outputs.total_count }}
          TOTAL_NEW_COUNT: ${{ steps.quality_metrics.outputs.total_new_count }}
        run: |
          python3 <<'PY'
          import os

          base_available = os.environ['BASE_AVAILABLE'] == 'true'
          total_count = int(os.environ['TOTAL_COUNT'])
          total_new_count = int(os.environ['TOTAL_NEW_COUNT'])

          if base_available:
              if total_new_count > 0:
                  raise SystemExit(f'New static quality findings introduced: {total_new_count}')
          elif total_count > 0:
              raise SystemExit(f'Static quality findings present on the branch: {total_count}')
          PY

  coverage:
    name: coverage
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Verify tests and generate coverage report
        run: |
          chmod +x mvnw
          ./mvnw --batch-mode verify

      - name: Check out base branch for coverage comparison
        if: github.event_name == 'pull_request'
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          path: base

      - name: Generate base branch coverage report
        if: github.event_name == 'pull_request'
        working-directory: base
        run: |
          chmod +x mvnw
          ./mvnw --batch-mode verify

      - name: Extract coverage metrics
        id: coverage_metrics
        run: |
          python3 <<'PY'
          import difflib
          import os
          import xml.etree.ElementTree as ET
          from pathlib import Path

          def read_report(report_path):
              report = ET.parse(report_path).getroot()
              counters = {
                  counter.attrib['type']: (int(counter.attrib['missed']), int(counter.attrib['covered']))
                  for counter in report.findall('counter')
              }
            source_lines = {}

            for package in report.findall('package'):
              package_name = package.attrib.get('name', '')
              for sourcefile in package.findall('sourcefile'):
                relative_path = f"{package_name}/{sourcefile.attrib['name']}" if package_name else sourcefile.attrib['name']
                source_lines[relative_path] = {
                  int(line.attrib['nr']): {
                    'missed_instructions': int(line.attrib.get('mi', '0')),
                    'covered_instructions': int(line.attrib.get('ci', '0')),
                  }
                  for line in sourcefile.findall('line')
                }

              def ratio(counter_name):
                  missed, covered = counters[counter_name]
                  total = missed + covered
                  return 0.0 if total == 0 else covered / total

            return ratio('LINE'), ratio('BRANCH'), source_lines

          def changed_lines_against_base(current_root, base_root):
            changed = {}
            if not current_root.exists():
              return changed

            for current_file in current_root.rglob('*.java'):
              relative_path = current_file.relative_to(current_root).as_posix()
              base_file = base_root / relative_path
              current_lines = current_file.read_text(encoding='utf-8').splitlines()
              base_lines = base_file.read_text(encoding='utf-8').splitlines() if base_file.exists() else []

              if current_lines == base_lines:
                continue

              matcher = difflib.SequenceMatcher(a=base_lines, b=current_lines, autojunk=False)
              line_numbers = set()
              for tag, _i1, _i2, j1, j2 in matcher.get_opcodes():
                if tag in ('replace', 'insert'):
                  line_numbers.update(range(j1 + 1, j2 + 1))

              if line_numbers:
                changed[relative_path] = line_numbers

            return changed

          def format_pp(delta):
              return f'{delta * 100:+.2f} pp'

          line_ratio, branch_ratio, source_lines = read_report('target/site/jacoco/jacoco.xml')
          line_min = float(os.environ['COVERAGE_LINE_MIN'])
          branch_min = float(os.environ['COVERAGE_BRANCH_MIN'])
          diff_line_min = float(os.environ['COVERAGE_DIFF_LINE_MIN'])
          base_report_path = Path('base/target/site/jacoco/jacoco.xml')
          base_available = base_report_path.exists()

          base_line_ratio = None
          base_branch_ratio = None
          if base_available:
            base_line_ratio, base_branch_ratio, _ = read_report(base_report_path)

          diff_available = False
          diff_ratio = None
          diff_covered_lines = 0
          diff_total_lines = 0
          diff_examples = []
          if base_available:
            changed_lines = changed_lines_against_base(Path('src/main/java'), Path('base/src/main/java'))
            for relative_path, line_numbers in changed_lines.items():
              coverage_by_line = source_lines.get(relative_path, {})
              executable_changed_lines = [
                line_number
                for line_number in sorted(line_numbers)
                if line_number in coverage_by_line
                and coverage_by_line[line_number]['missed_instructions'] + coverage_by_line[line_number]['covered_instructions'] > 0
              ]
              for line_number in executable_changed_lines:
                diff_total_lines += 1
                if coverage_by_line[line_number]['covered_instructions'] > 0:
                  diff_covered_lines += 1
                elif len(diff_examples) < 5:
                  diff_examples.append(f'{relative_path}:{line_number}')

            if diff_total_lines > 0:
              diff_available = True
              diff_ratio = diff_covered_lines / diff_total_lines

          with open(os.environ['GITHUB_OUTPUT'], 'a', encoding='utf-8') as handle:
              handle.write(f'line_ratio={line_ratio:.4f}\n')
              handle.write(f'branch_ratio={branch_ratio:.4f}\n')
              handle.write(f'line_ratio_pct={line_ratio:.2%}\n')
              handle.write(f'branch_ratio_pct={branch_ratio:.2%}\n')
              handle.write(f'line_min_pct={line_min:.0%}\n')
              handle.write(f'branch_min_pct={branch_min:.0%}\n')
            handle.write(f'diff_min_pct={diff_line_min:.0%}\n')
              handle.write(f'base_available={str(base_available).lower()}\n')
            handle.write(f'diff_available={str(diff_available).lower()}\n')
            handle.write(f'diff_covered_lines={diff_covered_lines}\n')
            handle.write(f'diff_total_lines={diff_total_lines}\n')
            handle.write(f'diff_examples={"; ".join(diff_examples)}\n')

            if diff_available and diff_ratio is not None:
              handle.write(f'diff_ratio={diff_ratio:.4f}\n')
              handle.write(f'diff_ratio_pct={diff_ratio:.2%}\n')

              if base_available:
                  handle.write(f'base_line_ratio_pct={base_line_ratio:.2%}\n')
                  handle.write(f'base_branch_ratio_pct={base_branch_ratio:.2%}\n')
                  handle.write(f'line_delta_pp={format_pp(line_ratio - base_line_ratio)}\n')
                  handle.write(f'branch_delta_pp={format_pp(branch_ratio - base_branch_ratio)}\n')

          summary = os.environ['GITHUB_STEP_SUMMARY']
          with open(summary, 'a', encoding='utf-8') as handle:
              handle.write('## Code Coverage\n\n')
              if base_available:
                  handle.write('| Metric | PR | Base | Delta | Minimum |\n')
                  handle.write('| --- | ---: | ---: | ---: | ---: |\n')
                  handle.write(
                      f'| Line | {line_ratio:.2%} | {base_line_ratio:.2%} | {format_pp(line_ratio - base_line_ratio)} | {line_min:.0%} |\n'
                  )
                  handle.write(
                      f'| Branch | {branch_ratio:.2%} | {base_branch_ratio:.2%} | {format_pp(branch_ratio - base_branch_ratio)} | {branch_min:.0%} |\n'
                  )
                    handle.write('\n')
                    if diff_available and diff_ratio is not None:
                      handle.write('| Diff Metric | Coverage | Covered Lines | Total Changed Lines | Minimum |\n')
                      handle.write('| --- | ---: | ---: | ---: | ---: |\n')
                      handle.write(
                        f'| Changed executable lines | {diff_ratio:.2%} | {diff_covered_lines} | {diff_total_lines} | {diff_line_min:.0%} |\n'
                      )
                    else:
                      handle.write('No executable changed lines detected for diff coverage.\n')
              else:
                  handle.write('| Metric | Coverage | Minimum |\n')
                  handle.write('| --- | ---: | ---: |\n')
                  handle.write(f'| Line | {line_ratio:.2%} | {line_min:.0%} |\n')
                  handle.write(f'| Branch | {branch_ratio:.2%} | {branch_min:.0%} |\n')
          PY

      - name: Comment coverage on pull request
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/github-script@v9
        env:
          BASE_AVAILABLE: ${{ steps.coverage_metrics.outputs.base_available }}
          LINE_RATIO_PCT: ${{ steps.coverage_metrics.outputs.line_ratio_pct }}
          BRANCH_RATIO_PCT: ${{ steps.coverage_metrics.outputs.branch_ratio_pct }}
          BASE_LINE_RATIO_PCT: ${{ steps.coverage_metrics.outputs.base_line_ratio_pct }}
          BASE_BRANCH_RATIO_PCT: ${{ steps.coverage_metrics.outputs.base_branch_ratio_pct }}
          LINE_DELTA_PP: ${{ steps.coverage_metrics.outputs.line_delta_pp }}
          BRANCH_DELTA_PP: ${{ steps.coverage_metrics.outputs.branch_delta_pp }}
          LINE_MIN_PCT: ${{ steps.coverage_metrics.outputs.line_min_pct }}
          BRANCH_MIN_PCT: ${{ steps.coverage_metrics.outputs.branch_min_pct }}
          DIFF_AVAILABLE: ${{ steps.coverage_metrics.outputs.diff_available }}
          DIFF_RATIO_PCT: ${{ steps.coverage_metrics.outputs.diff_ratio_pct }}
          DIFF_COVERED_LINES: ${{ steps.coverage_metrics.outputs.diff_covered_lines }}
          DIFF_TOTAL_LINES: ${{ steps.coverage_metrics.outputs.diff_total_lines }}
          DIFF_MIN_PCT: ${{ steps.coverage_metrics.outputs.diff_min_pct }}
          DIFF_EXAMPLES: ${{ steps.coverage_metrics.outputs.diff_examples }}
        with:
          script: |
            const marker = '<!-- coverage-report -->';
            const baseRef = context.payload.pull_request.base.ref;
            const bodyLines = [marker, '## Code Coverage', ''];

            if (process.env.BASE_AVAILABLE === 'true') {
              bodyLines.push(`Compared with base branch \`${baseRef}\`.`);
              bodyLines.push('');
              bodyLines.push('| Metric | PR | Base | Delta | Minimum |');
              bodyLines.push('| --- | ---: | ---: | ---: | ---: |');
              bodyLines.push(
                `| Line | ${process.env.LINE_RATIO_PCT} | ${process.env.BASE_LINE_RATIO_PCT} | ${process.env.LINE_DELTA_PP} | ${process.env.LINE_MIN_PCT} |`
              );
              bodyLines.push(
                `| Branch | ${process.env.BRANCH_RATIO_PCT} | ${process.env.BASE_BRANCH_RATIO_PCT} | ${process.env.BRANCH_DELTA_PP} | ${process.env.BRANCH_MIN_PCT} |`
              );
              bodyLines.push('');
              if (process.env.DIFF_AVAILABLE === 'true') {
                bodyLines.push('| Diff Metric | Coverage | Covered Lines | Total Changed Lines | Minimum |');
                bodyLines.push('| --- | ---: | ---: | ---: | ---: |');
                bodyLines.push(
                  `| Changed executable lines | ${process.env.DIFF_RATIO_PCT} | ${process.env.DIFF_COVERED_LINES} | ${process.env.DIFF_TOTAL_LINES} | ${process.env.DIFF_MIN_PCT} |`
                );
                if (process.env.DIFF_EXAMPLES) {
                  bodyLines.push('');
                  bodyLines.push(`Uncovered changed lines: ${process.env.DIFF_EXAMPLES}.`);
                }
              } else {
                bodyLines.push('');
                bodyLines.push('No executable changed lines detected for diff coverage.');
              }
            } else {
              bodyLines.push('| Metric | Coverage | Minimum |');
              bodyLines.push('| --- | ---: | ---: |');
              bodyLines.push(`| Line | ${process.env.LINE_RATIO_PCT} | ${process.env.LINE_MIN_PCT} |`);
              bodyLines.push(`| Branch | ${process.env.BRANCH_RATIO_PCT} | ${process.env.BRANCH_MIN_PCT} |`);
            }

            const body = bodyLines.join('\n');

            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });

            const existing = comments.find((comment) =>
              comment.user?.type === 'Bot' && comment.body?.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }

      - name: Enforce coverage thresholds
        env:
          BASE_AVAILABLE: ${{ steps.coverage_metrics.outputs.base_available }}
          DIFF_AVAILABLE: ${{ steps.coverage_metrics.outputs.diff_available }}
          DIFF_RATIO: ${{ steps.coverage_metrics.outputs.diff_ratio }}
          LINE_RATIO: ${{ steps.coverage_metrics.outputs.line_ratio }}
          BRANCH_RATIO: ${{ steps.coverage_metrics.outputs.branch_ratio }}
        run: |
          python3 <<'PY'
          import os

          base_available = os.environ['BASE_AVAILABLE'] == 'true'
          diff_available = os.environ['DIFF_AVAILABLE'] == 'true'
          line_ratio = float(os.environ['LINE_RATIO'])
          branch_ratio = float(os.environ['BRANCH_RATIO'])
          line_min = float(os.environ['COVERAGE_LINE_MIN'])
          branch_min = float(os.environ['COVERAGE_BRANCH_MIN'])

          if line_ratio < line_min or branch_ratio < branch_min:
              raise SystemExit(
                  f'Coverage threshold not met: line={line_ratio:.2%}, branch={branch_ratio:.2%}'
              )

          if base_available and diff_available:
            diff_ratio = float(os.environ['DIFF_RATIO'])
            diff_min = float(os.environ['COVERAGE_DIFF_LINE_MIN'])
            if diff_ratio < diff_min:
              raise SystemExit(
                f'Diff coverage threshold not met: changed-lines={diff_ratio:.2%}, minimum={diff_min:.0%}'
              )
          PY