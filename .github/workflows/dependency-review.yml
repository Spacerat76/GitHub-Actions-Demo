name: Dependency Review

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pull-requests: write

jobs:
  dependency-review:
    name: dependency-review
    runs-on: ubuntu-latest

    steps:
      - name: Dependency review
        id: dependency_review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: moderate

      - name: Comment dependency review on pull request
        if: always() && github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/github-script@v9
        env:
          REVIEW_OUTCOME: ${{ steps.dependency_review.outcome }}
        with:
          script: |
            const marker = '<!-- dependency-review-report -->';
            const outcome = process.env.REVIEW_OUTCOME || 'unknown';
            const statusMap = {
              success: 'Passed',
              failure: 'Failed',
              cancelled: 'Cancelled',
              skipped: 'Skipped',
            };
            const body = [
              marker,
              '## Dependency Review',
              '',
              `Status: ${statusMap[outcome] || outcome}`,
              '',
              'Policy: fail on new dependency issues with severity `moderate` or higher.',
            ].join('\n');

            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });

            const existing = comments.find((comment) =>
              comment.user?.type === 'Bot' && comment.body?.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }
